<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jogos Zerados</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <!-- TOP NAV -->
    <nav class="top-nav">
      <div class="nav-left">
        <span class="nav-logo">Jogos Zerados</span>
        <div class="nav-tabs">
          <button class="nav-tab is-active" data-filter="all">Todos os Jogos</button>
          <button class="nav-tab" data-filter="completed">Zerados</button>
          <button class="nav-tab" data-filter="playing">Em Andamento</button>
        </div>
      </div>
      <div class="nav-right">
        <button id="open-form-button" class="add-button">+ Adicionar Jogo</button>
      </div>
    </nav>

    <!-- TOOLBAR -->
    <div class="toolbar">
      <div class="toolbar-left">
        <span id="game-count" class="game-count">0 jogos</span>
        <div class="t-divider"></div>
        <label class="sort-wrapper">
          <span class="sort-label">Ordenar:</span>
          <select id="sort-select">
            <option value="recent">Mais recente</option>
            <option value="name">Nome (A–Z)</option>
            <option value="hours">Horas jogadas</option>
            <option value="rating">Nota</option>
          </select>
        </label>
      </div>
    </div>

    <!-- DRAWER OVERLAY -->
    <div id="drawer-overlay" class="drawer-overlay"></div>

    <!-- FORM DRAWER -->
    <aside id="form-drawer" class="form-drawer" aria-hidden="true">
      <div class="drawer-header">
        <h2 id="drawer-title">Adicionar Jogo</h2>
        <button id="close-form-button" class="icon-button" aria-label="Fechar">✕</button>
      </div>

      <form id="game-form" class="game-form">
        <input type="hidden" id="edit-id" />

        <div class="field">
          <label for="name">Nome do Jogo</label>
          <input id="name" name="name" type="text" maxlength="120" placeholder="Ex: Hollow Knight" required />
        </div>

        <div class="field">
          <label for="cover">URL da Capa</label>
          <input id="cover" name="cover" type="text" maxlength="500" placeholder="https://..." />
        </div>

        <div class="cover-preview-wrap is-hidden" id="cover-preview-wrap">
          <img id="cover-preview" class="cover-preview" alt="Preview da capa" />
        </div>

        <div class="field-row">
          <div class="field">
            <label for="hoursPlayed">Horas jogadas</label>
            <input id="hoursPlayed" name="hoursPlayed" type="number" min="0" step="0.5" value="0" required />
          </div>
          <div class="field">
            <label for="rating">Nota (0–10)</label>
            <input id="rating" name="rating" type="number" min="0" max="10" step="0.1" placeholder="Opcional" />
          </div>
        </div>

        <div class="field">
          <label for="comment">Comentário</label>
          <textarea id="comment" name="comment" maxlength="600" rows="4" placeholder="O que achou do jogo?"></textarea>
        </div>

        <label class="checkbox-row">
          <input id="completed" name="completed" type="checkbox" />
          <span>Marcar como zerado</span>
        </label>

        <div class="form-actions">
          <button class="btn-ghost" type="button" id="reset-form-button">Limpar</button>
          <button class="btn-primary" type="submit" id="submit-button">Salvar Jogo</button>
        </div>
      </form>
    </aside>

    <!-- LIBRARY -->
    <main class="library-section">
      <div id="empty-state" class="empty-state is-hidden">
        <div class="empty-icon">🎮</div>
        <h3>Nenhum jogo aqui ainda</h3>
        <p>Clique em "Adicionar Jogo" para começar sua biblioteca.</p>
      </div>
      <div id="games-grid" class="games-grid"></div>
    </main>

    <!-- DETAIL MODAL -->
    <div id="details-backdrop" class="modal-backdrop is-hidden">
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="details-title">
        <div class="modal-cover-wrap">
          <img id="details-cover" alt="" />
          <div class="modal-cover-gradient"></div>
          <button id="close-details-button" class="modal-close" type="button" aria-label="Fechar">✕</button>
        </div>
        <div class="modal-body">
          <div class="modal-status-row">
            <span id="details-badge" class="modal-badge"></span>
            <div class="modal-hours">
              <span>⏱</span>
              <span id="details-hours"></span>
            </div>
          </div>
          <h2 id="details-title" class="modal-title"></h2>
          <p id="details-comment" class="modal-comment"></p>
          <div class="modal-meta-row">
            <div class="modal-meta-chip">
              <span>Nota</span>
              <strong id="details-rating"></strong>
            </div>
            <div class="modal-meta-chip">
              <span>Adicionado em</span>
              <strong id="details-created-at"></strong>
            </div>
          </div>
          <div class="modal-actions">
            <button id="details-edit-button" class="btn-ghost" type="button">✏️ Editar</button>
            <button id="details-delete-button" class="btn-danger" type="button">🗑 Remover</button>
            <button id="close-details-button2" class="btn-primary" type="button">Fechar</button>
          </div>
        </div>
      </div>
    </div>

    <!-- DELETE CONFIRM -->
    <div id="confirm-backdrop" class="modal-backdrop is-hidden">
      <div class="confirm-card" role="dialog" aria-modal="true">
        <div class="confirm-icon"></div>
        <h3>Remover jogo?</h3>
        <p id="confirm-game-name" class="confirm-name"></p>
        <p class="confirm-desc">Essa ação não pode ser desfeita.</p>
        <div class="confirm-actions">
          <button id="confirm-cancel" class="btn-ghost">Cancelar</button>
          <button id="confirm-delete" class="btn-danger">Sim, remover</button>
        </div>
      </div>
    </div>

    <div id="feedback-banner" class="feedback-banner is-hidden" role="status" aria-live="polite"></div>

    <script src="script.js"></script>
  </body>
</html>
